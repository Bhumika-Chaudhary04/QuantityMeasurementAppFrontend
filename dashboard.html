<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quanment – Converter</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-logo">Quanment</div>
    <div class="nav-links">
      <a class="active" id="navConverter" onclick="showConverter()">Converter</a>
      <a id="navHistory" onclick="showHistory()">History</a>
    </div>
    <div class="nav-right">
      <div class="nav-user" id="navUser">JD</div>
      <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>
  </nav>

  <!-- HERO BANNER -->
  <div class="hero">Welcome To Quantity Measurement</div>

  <!-- CONVERTER SECTION -->
  <div class="main" id="converterSection">
    <div class="section-label">Choose Type</div>
    <div class="type-grid">
      <div class="type-card active" id="card-length" onclick="setType('length', this)">
        <span class="icon">📏</span>
        <div class="label">Length</div>
      </div>
      <div class="type-card" id="card-temperature" onclick="setType('temperature', this)">
        <span class="icon">🌡️</span>
        <div class="label">Temperature</div>
      </div>
      <div class="type-card" id="card-volume" onclick="setType('volume', this)">
        <span class="icon">🧪</span>
        <div class="label">Volume</div>
      </div>
    </div>

    <div class="converter-panel">
      <div class="converter-row">
        <div class="field-group">
          <div class="field-label">From</div>
          <input class="number-input" type="number" id="fromVal" value="1" oninput="liveConvert()">
          <select class="unit-select" id="fromUnit" onchange="liveConvert()"></select>
        </div>
        <button class="swap-btn" onclick="swapUnits()" title="Swap">⇄</button>
        <div class="field-group">
          <div class="field-label">To</div>
          <input class="number-input result-input" type="number" id="toVal" placeholder="—" readonly>
          <select class="unit-select" id="toUnit" onchange="liveConvert()"></select>
        </div>
      </div>

      <button class="convert-btn" onclick="doConvert()">Convert →</button>

      <div class="result-box" id="resultBox">
        <div class="result-label">Result</div>
        <div class="result-value" id="resultVal"></div>
        <div class="result-desc" id="resultDesc"></div>
      </div>
    </div>
  </div>

  <!-- HISTORY SECTION -->
  <div class="history-panel" id="historySection">
    <div class="history-header">
      <div class="history-title">Conversion History</div>
      <button class="clear-btn" onclick="clearHistory()">Clear All</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
